  /domain/renew/{domain}:
    post:
      tags:
        - Domain
      summary: Renew a domain
      description: >-
        Renew a domain using account credit. Requirements:

        - Domain must be in your account and active

        - Domain must be opted in to API access

        - Account email and phone must be verified

        - Account must have sufficient credit

        - `cost` must equal the current renewal price for the domain's minimum
        renewal duration (in pennies)

        - Domain must have been registered more than 30 days ago (checked
        against the domain's creation date)

        - Domain must not have been successfully renewed within the last 30 days

        - Premium renewals are not currently supported via API


        Renewals are always for the registry-minimum duration (usually 1 year).
        Use `/domain/checkDomain/{domain}` with `priceType=renewal` to get the
        current price before renewing.


        **Rate limits (both apply):**

        - Attempt limit (default: 1 attempt per 10 seconds per account)

        - Success limit (default: 25 successful renewals per 86400 seconds per
        account)


        Both limits are configurable per API key and their current values are
        returned in the `limits` field of the response.
      operationId: domainRenew
      x-ratelimit:
        requests: null
        window: null
        windowUnit: seconds
        scope: account
        note: "Two separate limits apply. Attempt limit: default 1 attempt per 10s
          (api.createLimit / api.createTTL). Success limit: default 25 successes
          per 86400s (api.createSuccessLimit / api.createSuccessTTL). Both are
          configurable per API key. Redis keys:
          API:renewSingleDomain:{accountId} and
          API:renewSuccessSingleDomain:{accountId}."
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          example: example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewDomainRequest"
      responses:
        "200":
          description: Domain renewed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenewDomainResponse"
        "400":
          description: Validation or rate-limit error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
      x-codeSamples:
        - lang: curl
          label: curl
          source: >-
            curl -X POST
            https://api.porkbun.com/api/json/v3/domain/renew/{domain} \
              -H 'Content-Type: application/json' \
              -d '{"apikey":"pk1_...","secretapikey":"sk1_...","cost":0}'
  /domain/transfer/{domain}:
    post:
      summary: Initiate a domain transfer
      description: >-
        Initiates an inbound domain transfer to Porkbun using account credit.
        The transfer is processed asynchronously and typically takes 5–7 days to
        complete.


        **Requirements:**

        - Account email and phone must be verified.

        - Sufficient account credit to cover the transfer cost.

        - Domain must not already be in your account.

        - No other active transfer for the same domain.

