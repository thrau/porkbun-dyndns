openapi: 3.0.0
info:
  title: Porkbun API v3
  version: "3.0"
  description: >-
    The Porkbun API enables programmatic domain registration, DNS management,
    SSL certificate retrieval, and related operations. It is fully usable by AI
    agents, automation scripts, and developer tools.

    ## Quickstart


    **1. Get your API keys** — visit https://porkbun.com/account/api


    **2. Test connectivity**

    ```bash

    curl https://api.porkbun.com/api/json/v3/ip

    ```

    Returns your public IP. No credentials required.


    **3. Check domain availability** (also verifies your credentials)

    ```bash

    curl -X POST
    https://api.porkbun.com/api/json/v3/domain/checkDomain/example.com \
      -H "Content-Type: application/json" \
      -d '{"apikey":"your_api_key","secretapikey":"your_secret_key"}'
    ```

    Returns `avail: "yes"/"no"` and `price` in USD. Returns an error if
    credentials are invalid.


    **4. Register the domain** — convert `price` to pennies (e.g. $9.73 → 973)
    for `cost`

    ```bash

    curl -X POST https://api.porkbun.com/api/json/v3/domain/create/example.com \
      -H "Content-Type: application/json" \
      -d '{"apikey":"your_api_key","secretapikey":"your_secret_key","cost":973,"agreeToTerms":"yes"}'
    ```


    **5. Add a DNS record**

    ```bash

    curl -X POST https://api.porkbun.com/api/json/v3/dns/create/example.com \
      -H "Content-Type: application/json" \
      -d '{"apikey":"your_api_key","secretapikey":"your_secret_key","type":"A","content":"1.2.3.4","ttl":"600"}'
    ```


    ## AI agents (MCP)


    If you're building with Claude Desktop, Cursor, Cline, or another [Model
    Context Protocol](https://modelcontextprotocol.io) client, install our
    official Porkbun MCP server — no integration code required, your AI client
    gets domain registration, DNS, SSL, marketplace, and account-management
    tools natively.


    ```bash

    npx -y @porkbunllc/mcp-server

    ```


    Repo and Claude Desktop config:
    [github.com/oborseth/Porkbun-MCP](https://github.com/oborseth/Porkbun-MCP).
    30 tools covering everything documented below. All write operations
    automatically attach an `Idempotency-Key` so agent retries don't
    double-charge.


    ## What you can build


    - **Agentic domain registration** — Search availability and pricing across
    hundreds of TLDs, then register domains on behalf of users with a single API
    call

    - **Automated DNS management** — Provision, update, and tear down DNS
    records as part of infrastructure automation or app deployment pipelines

    - **Dynamic DNS clients** — Use `/ping` or `/ip` to detect IP address
    changes, then update A/AAAA records automatically

    - **Domain portfolio tools** — List, monitor expiry, and configure
    auto-renewal settings across all domains in an account

    - **SSL automation** — Retrieve free SSL certificate bundles for domains
    registered at Porkbun

    - **Domain availability search** — Check availability and real-time pricing
    across all supported TLDs


    ## Agent-friendly design


    - **Machine-readable error codes** — Every error response includes a `code`
    field (e.g. `INVALID_DOMAIN`, `INSUFFICIENT_FUNDS`) for programmatic
    branching

    - **Header authentication** — Pass `X-API-Key` / `X-Secret-API-Key` as
    request headers; no JSON body required for read operations

    - **GET support on read endpoints** — All read-only endpoints accept `GET`
    requests, making safe/idempotent operations distinguishable by HTTP method

    - **Rate limit headers** — `X-RateLimit-Limit`, `X-RateLimit-Remaining`, and
    `X-RateLimit-Reset` on rate-limited endpoints enable intelligent backoff

    - **Spec discovery** — Every API response includes `Link:
    <https://porkbun.com/api/json/v3/spec>; rel="describedby"` so clients can
    self-discover this spec

    - **Idempotency keys** — Send `Idempotency-Key: <unique-string>` on POST
    endpoints; retries within 24h return the cached response so a network blip
    can't double-charge

    - **Official MCP server** — `npx -y @porkbunllc/mcp-server` exposes this
    entire API as native tools for Claude Desktop, Cursor, and other Model
    Context Protocol clients

    - **Request IDs** — every response carries an `X-Request-Id` header and a
    `requestId` field in the JSON body; reference these in support tickets,
    retry-deduplication logic, or log correlation


    ## Intended use


    The Porkbun API is not a reseller service as defined under ICANN’s Registrar
    Accreditation Agreement (RAA). All domain registrations are processed
    directly by Porkbun as the registrar of record. The API is intended for
    managing domains within your own account or on behalf of clients, and does
    not establish a reseller relationship.


    ## Authentication


    **1. JSON body (primary)** — Include `apikey` and `secretapikey` in the JSON
    request body. This is the standard method.


    **2. Request headers** — Pass `X-API-Key: <apikey>` and `X-Secret-API-Key:
    <secretapikey>` as headers instead of in the body. Header auth takes effect
    only when no body credentials are present.


    ## HTTP status codes


    - **400** — Request error (see `code` and `message` in response body)

    - **403** — Additional authentication required (e.g. two-factor code)

    - **429** — Rate limit exceeded (see `X-RateLimit-Reset` header for retry
    time)


    ## Error codes


    Every error response includes a `code` string field alongside `status:
    "ERROR"` and `message`. Use `code` for programmatic error handling; use
    `message` for display to users.


    **Authentication and protocol**


    | Code | Meaning |

    |------|---------|

    | `INVALID_PROTOCOL` | Request was not made over HTTPS |

    | `METHOD_NOT_ALLOWED` | HTTP method not allowed for this endpoint |

    | `INVALID_OR_EMPTY_JSON` | Request body is missing or not valid JSON |

    | `API_KEY_REQUIRED` | No API key or token was provided |

    | `INVALID_API_KEYS_001` | API key and secret combination is invalid |

    | `INVALID_TOKEN` | Bearer token is invalid or expired |

    | `INVALID_USER` | Account associated with the API key was not found or is
    not active |


    **Rate limiting**


    | Code | Meaning |

    |------|---------|

    | `RATE_LIMIT_EXCEEDED` | Request rate limit reached; see `ttlRemaining`
    field and `X-RateLimit-Reset` header for reset time |


    **Domain operations**


    | Code | Meaning |

    |------|---------|

    | `INVALID_DOMAIN` | Domain parameter is invalid or not in your account |

    | `DOMAIN_NOT_AVAILABLE` | Domain is not available for registration |

    | `INSUFFICIENT_FUNDS` | Account credit is insufficient to complete the
    purchase |


    **DNS operations**


    | Code | Meaning |

    |------|---------|

    | `INVALID_TYPE` | DNS record type is not supported |

    | `INVALID_RECORD_ID` | DNS record ID was not found or is not owned by your
    account |


    Additional endpoint-specific codes may be returned; always check `message`
    for details.


    ## Idempotency


    All v3 POST endpoints (excluding partner-only routes) accept an optional
    `Idempotency-Key` request header. When present, the API stores the response
    for 24 hours and replays it for any retry of the same request — so an agent
    that retries after a network blip will not double-charge or double-register.


    **Key format:** any non-empty string up to 255 characters. UUIDs work well;
    agents can also use their own internal request IDs.


    **Behavior on retry:**


    - **Same key, same request body** within 24h → returns the original response
    with header `Idempotent-Replayed: true`

    - **Same key, different request body** → returns 409 with `code:
    IDEMPOTENCY_KEY_MISMATCH` (catches accidental key reuse)

    - **Same key, original request still in flight** → returns 409 with `code:
    IDEMPOTENCY_KEY_IN_USE` (retry shortly)

    - **No header sent** → behavior is unchanged from before; no caching happens


    ```bash

    curl -X POST https://api.porkbun.com/api/json/v3/domain/create/example.com \
      -H "Idempotency-Key: a1b2c3d4-e5f6-7890-abcd-ef1234567890" \
      -H "X-API-Key: pk1_..." -H "X-Secret-API-Key: sk1_..." \
      -d '{"cost":973,"agreeToTerms":"yes"}'
    ```


    ## Rate limiting


    Some endpoints are rate limited. When exceeded, the API returns HTTP 429
    with a `RateLimitExceeded` response body. Fixed-limit endpoints
    (`/apikey/request`, `/apikey/retrieve`) also return `X-RateLimit-Limit`,
    `X-RateLimit-Remaining`, and `X-RateLimit-Reset` headers on every call.
  contact:
    name: Porkbun Support
    url: https://porkbun.com/support
  x-logo:
    url: https://porkbun.com/img/logo.png
servers:
  - url: https://api.porkbun.com/api/json/v3
    description: Production
  - url: https://api-ipv4.porkbun.com/api/json/v3
    description: Production (IPv4 only — use this if your client is on an IPv6
      network and needs to reach the API over IPv4)
paths:
  /ping:
    post:
      tags:
        - Utility
      summary: Test credentials and get caller IP
      description: >-
        Returns the caller's public IP address. Optionally validates API
        credentials.


        - **No credentials supplied** — returns IP only.

        - **Valid credentials supplied** — returns IP with `credentialsValid:
        true`.

        - **Invalid credentials supplied** — returns an error.


        Useful for agents and clients to verify their API key is working before
        making other calls.
      operationId: ping
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                apikey:
                  type: string
                  description: Your API key (optional)
                secretapikey:
                  type: string
                  description: Your secret API key (optional, required if apikey is supplied)
      responses:
        "200":
          description: Success — IP returned, credentials validated if supplied
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/IpResponse"
                  - type: object
                    properties:
                      credentialsValid:
                        type: boolean
                        description: Present and true when valid credentials were supplied
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl -X POST https://api.porkbun.com/api/json/v3/ping \
              -H 'Content-Type: application/json' \
              -d '[]'
    get:
      tags:
        - Utility
      summary: Test credentials and get caller IP
      description: >-
        Returns the caller's public IP address. Optionally validates API
        credentials.


        - **No credentials supplied** — returns IP only.

        - **Valid credentials supplied** — returns IP with `credentialsValid:
        true`.

        - **Invalid credentials supplied** — returns an error.


        Useful for agents and clients to verify their API key is working before
        making other calls.
      operationId: pingGet
      parameters:
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
          description: API key header auth (use with X-Secret-API-Key)
        - name: X-Secret-API-Key
          in: header
          required: false
          schema:
            type: string
          description: Secret API key header auth (use with X-API-Key)
      responses:
        "200":
          description: Success — IP returned, credentials validated if supplied
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/IpResponse"
                  - type: object
                    properties:
                      credentialsValid:
                        type: boolean
                        description: Present and true when valid credentials were supplied
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: curl 'https://api.porkbun.com/api/json/v3/ping'
  /ip:
    post:
      tags:
        - Utility
      summary: Get caller IP address
      description: Returns the caller's public IP address. No credentials required.
        Use the `api-ipv4.porkbun.com` hostname if you need to force an IPv4
        address.
      operationId: ipPost
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Caller IP address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpResponse"
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl -X POST https://api.porkbun.com/api/json/v3/ip \
              -H 'Content-Type: application/json' \
              -d '[]'
    get:
      tags:
        - Utility
      summary: Get caller IP address
      description: Returns the caller's public IP address. No credentials required.
        Use the `api-ipv4.porkbun.com` hostname if you need to force an IPv4
        address.
      operationId: getIp
      parameters: []
      responses:
        "200":
          description: Caller IP address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpResponse"
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: curl 'https://api.porkbun.com/api/json/v3/ip'
  /pricing/get:
    post:
      tags:
        - Pricing
      summary: Retrieve domain pricing (public)
      description: Retrieve default domain pricing information for all supported TLDs.
        Does not require authentication. Prices are in US dollars.
      operationId: getPricing
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tlds:
                  type: array
                  items:
                    type: string
                  description: Optional array of TLDs to filter results. If omitted, all supported
                    TLDs are returned.
      responses:
        "200":
          description: Pricing data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  pricing:
                    type: object
                    description: Object keyed by TLD string
                    additionalProperties:
                      type: object
                      properties:
                        registration:
                          type: string
                          example: "9.73"
                        renewal:
                          type: string
                          example: "9.73"
                        transfer:
                          type: string
                          example: "9.73"
                        specialType:
                          type: string
                          description: Present only for special TLDs (e.g. 'handshake')
                        coupons:
                          type: object
                          description: Active coupon codes for this TLD, keyed by product type
                          additionalProperties:
                            type: object
                            properties:
                              code:
                                type: string
                              max_per_user:
                                type: integer
                              first_year_only:
                                type: string
                                enum:
                                  - yes
                                  - no
                              type:
                                type: string
                              amount:
                                type: number
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl -X POST https://api.porkbun.com/api/json/v3/pricing/get \
              -H 'Content-Type: application/json' \
              -d '{"tlds":[]}'
    get:
      tags:
        - Pricing
      summary: Retrieve domain pricing (public)
      description: >-
        Retrieve default domain pricing information for all supported TLDs. Does
        not require authentication. Prices are in US dollars.


        This GET form returns pricing for all TLDs. To filter by specific TLDs,
        use `POST /pricing/get` with a `tlds` array in the request body.
      operationId: getPricingGet
      parameters: []
      responses:
        "200":
          description: Pricing data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  pricing:
                    type: object
                    description: Object keyed by TLD string
                    additionalProperties:
                      type: object
                      properties:
                        registration:
                          type: string
                          example: "9.73"
                        renewal:
                          type: string
                          example: "9.73"
                        transfer:
                          type: string
                          example: "9.73"
                        specialType:
                          type: string
                          description: Present only for special TLDs (e.g. 'handshake')
                        coupons:
                          type: object
                          description: Active coupon codes for this TLD, keyed by product type
                          additionalProperties:
                            type: object
                            properties:
                              code:
                                type: string
                              max_per_user:
                                type: integer
                              first_year_only:
                                type: string
                                enum:
                                  - yes
                                  - no
                              type:
                                type: string
                              amount:
                                type: number
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: curl 'https://api.porkbun.com/api/json/v3/pricing/get'
  /apikey/request:
    post:
      tags:
        - API Key Management
      summary: Initiate an API key authorization request
      description: >-
        Initiate an API key authorization flow. No credentials are required.
        Returns a `requestToken` and `authUrl` that the account holder must
        visit to approve the request. After approval, the application should
        poll `/apikey/retrieve` to get the public API key. The secret API key is
        shown only in the user's browser and must be pasted into the application
        manually.


        **Rate limit:** 20 requests per IP per 3600 seconds.
      operationId: apikeyRequest
      x-ratelimit:
        requests: 20
        window: 3600
        windowUnit: seconds
        scope: ip
        note: Counted per originating IP address. The Redis key is
          API:apikeyRequest:{ip}.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: Optional human-readable name for the application requesting access.
      responses:
        "200":
          description: Authorization request created
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Maximum requests allowed in the window (20)
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Remaining requests in the current window
            X-RateLimit-Reset:
              schema:
                type: integer
              description: Unix timestamp when the window resets
          content:
            application/json:
              schema:
                type: object
                required:
                  - requestToken
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  requestToken:
                    type: string
                    description: Token used to poll `/apikey/retrieve` to check approval status.
                  authUrl:
                    type: string
                    description: URL the account holder must visit to approve the request
                    example: https://porkbun.com/account/apiKeyApproval/abc123...
                  expiration:
                    type: string
                    description: ISO datetime when this request expires (10 minutes from creation)
                    example: 2026-03-30 14:30:00
                  message:
                    type: string
                    description: Human-readable instructions
        "400":
          description: Validation error (e.g. app name too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl -X POST https://api.porkbun.com/api/json/v3/apikey/request \
              -H 'Content-Type: application/json' \
              -d '[]'
  /apikey/retrieve:
    post:
      tags:
        - API Key Management
      summary: Poll for API key approval
      description: >-
        Poll to check whether the account holder has approved an API key
        authorization request. Returns `status: PENDING` while awaiting
        approval. On approval, returns the public API key. The secret API key is
        never transmitted via this endpoint — it is displayed in the user's
        browser and must be pasted into the application.


        **Rate limit:** 120 requests per IP per 3600 seconds.
      operationId: apikeyRetrieve
      x-ratelimit:
        requests: 120
        window: 3600
        windowUnit: seconds
        scope: ip
        note: Counted per originating IP address. The Redis key is
          API:apikeyRetrieve:{ip}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requestToken
              properties:
                requestToken:
                  type: string
                  description: The token returned by /apikey/request. Must be a 64-character
                    lowercase hex string.
                  pattern: ^[a-f0-9]{64}$
      responses:
        "200":
          description: Approval status. `status` may be `SUCCESS` (approved), `PENDING`
            (awaiting user action), or `ERROR` (expired/denied/invalid).
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Maximum requests allowed in the window (120)
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Remaining requests in the current window
            X-RateLimit-Reset:
              schema:
                type: integer
              description: Unix timestamp when the window resets
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - SUCCESS
                      - PENDING
                      - ERROR
                    example: SUCCESS
                  apikey:
                    type: string
                    description: The approved public API key. Present only when status is SUCCESS.
                  message:
                    type: string
                  code:
                    type: string
                    description: Machine-readable error code. Present when status is ERROR.
        "400":
          description: Validation error or expired/denied token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Request was denied by the account holder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
      security: []
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl -X POST https://api.porkbun.com/api/json/v3/apikey/retrieve \
              -H 'Content-Type: application/json' \
              -d '[]'
  /domain/checkDomain/{domain}:
    post:
      tags:
        - Domain
      summary: Check domain availability
      description: >-
        Check if a domain is available for registration and retrieve current
        pricing. Includes registration, renewal, and transfer prices.


        **Rate limit:** Configurable per API key. Default is 1 check per 10
        seconds per account. Rate limit usage is returned in the `limits` field
        of the response.
      operationId: domainCheckDomain
      x-ratelimit:
        requests: 1
        window: 10
        windowUnit: seconds
        scope: account
        note: Default values. The actual limit and window are configurable per API key
          (api.checkLimit / api.checkTTL). The Redis key is
          API:checkSingleDomain:{accountId}.
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          example: example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Availability and pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDomainResponse"
        "400":
          description: Rate limit exceeded (returned as 200 body with status ERROR) or
            other error. See also 429.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitExceeded"
      x-codeSamples:
        - lang: curl
          label: curl
          source: >-
            curl -X POST
            https://api.porkbun.com/api/json/v3/domain/checkDomain/{domain} \
              -H 'Content-Type: application/json' \
              -d '{"apikey":"pk1_...","secretapikey":"sk1_..."}'
  /domain/create/{domain}:
    post:
      tags:
        - Domain
      summary: Register a domain
      description: >-
        Register a domain using account credit. Requirements:

        - Account email and phone must be verified

        - Account must have sufficient credit

        - `agreeToTerms` must be `'yes'` or `'1'`

        - `cost` must equal the current price for the domain's minimum
        registration duration (in pennies)

        - Account must have placed at least one previous domain registration

        - Premium domains cannot be registered via API


        Registrations are always for the registry-minimum duration (usually 1
        year).


        **Rate limits (both apply):**

        - Attempt limit (default: 1 attempt per 10 seconds per account)

        - Success limit (default: 10 successful registrations per 86400 seconds
        per account)


        Both limits are configurable per API key and their current values are
        returned in the `limits` field of the response.
      operationId: domainCreate
      x-ratelimit:
        requests: null
        window: null
        windowUnit: seconds
        scope: account
        note: "Two separate limits apply. Attempt limit: default 1 attempt per 10s
          (api.createLimit / api.createTTL). Success limit: default 10 successes
          per 86400s (api.createSuccessLimit / api.createSuccessTTL). Both are
          configurable per API key. Redis keys:
          API:createSingleDomain:{accountId} and
          API:createSuccessSingleDomain:2:{accountId}."
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          example: example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDomainRequest"
      responses:
        "200":
          description: Domain registered successfully
