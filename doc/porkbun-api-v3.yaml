components:
  schemas:
    IpResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        yourIp:
          type: string
          example: 1.2.3.4
          description: The caller's public IP address
        xForwardedFor:
          type: string
          example: 1.2.3.4
          description: Raw value of the X-Forwarded-For header
      required:
        - status
        - yourIp
    AuthRequest:
      type: object
      description: API credentials. Provide `apikey`/`secretapikey` in the request
        body, OR supply them as `X-API-Key`/`X-Secret-API-Key` request headers.
        One of the two methods is required.
      properties:
        apikey:
          type: string
          description: Your API key. Required in body when not using header auth.
          example: pk1_...
        secretapikey:
          type: string
          description: Your secret API key. Required in body when providing apikey.
          example: sk1_...
    BasicResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - ERROR
          example: SUCCESS
        message:
          type: string
          description: Human-readable message. Present on ERROR, sometimes on SUCCESS.
        code:
          type: string
          description: Machine-readable error code. Present when status is ERROR.
      required:
        - status
    ErrorResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum:
            - ERROR
          example: ERROR
        message:
          type: string
          description: Human-readable description of the error
          example: Invalid domain.
        code:
          type: string
          description: Machine-readable error code. Use for programmatic handling; use
            `message` for display. See the Error codes section in the API
            description for a full list.
          example: INVALID_DOMAIN
    RateLimitExceeded:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum:
            - ERROR
          example: ERROR
        message:
          type: string
          example: Rate limit exceeded. Please try again later.
        code:
          type: string
          example: RATE_LIMIT_EXCEEDED
        ttlRemaining:
          type: integer
          description: Seconds until the rate limit window resets. Present on some
            endpoints.
    ListAllRequest:
      type: object
      required:
        - apikey
        - secretapikey
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        start:
          type: integer
          default: 0
          description: "Zero-based offset for pagination (default: 0). Returns up to 1000
            domains per call."
        includeLabels:
          type: string
          enum:
            - yes
            - no
          description: Return label metadata for each domain. Defaults to no.
        domain:
          type: string
          description: Exact domain name match. Returns 0 or 1 result. Useful as an
            alternative to `/domain/get/{domain}`.
          example: example.com
        nameContains:
          type: string
          description: Substring match against the full domain name. Case-insensitive.
          example: shop
        expiringWithinDays:
          type: integer
          description: Filter to domains expiring within this many days (relative to now).
          example: 30
        tlds:
          type: array
          items:
            type: string
          description: Limit to these TLDs (without leading dot).
          example:
            - com
            - io
        autoRenew:
          type: string
          enum:
            - yes
            - no
          description: Filter to domains with auto-renew on or off.
        apiAccess:
          type: string
          enum:
            - yes
            - no
          description: Filter to domains opted in to API access (yes) or not (no). Useful
            for finding domains an API key can actually operate on.
        sortName:
          type: string
          enum:
            - domain
            - tld
            - create_date
            - expire_date
          description: "Field to sort by. Default: `expire_date` ascending."
        sortDirection:
          type: string
          enum:
            - asc
            - desc
          description: "Sort direction. Default: asc."
    DomainListAllResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        count:
          type: integer
          description: Number of domains returned in this page.
        domains:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
                example: example.com
              status:
                type: string
                description: Domain registration status (e.g. ACTIVE)
                example: ACTIVE
              tld:
                type: string
                example: com
              createDate:
                type: string
                example: 2021-01-15 10:00:00
              expireDate:
                type: string
                example: 2027-01-15 10:00:00
              securityLock:
                type: integer
                description: 1 if transfer lock is enabled, 0 otherwise
                example: 1
              whoisPrivacy:
                type: integer
                description: 1 if WHOIS privacy is enabled, 0 otherwise
                example: 1
              autoRenew:
                type: integer
                description: 1 if auto-renew is enabled, 0 otherwise
                example: 1
              apiAccess:
                type: integer
                description: 1 if the domain is opted in to API access, 0 otherwise. Per-domain
                  API access can be toggled at porkbun.com/account or globally
                  via the `Opt In All Domains` setting.
                example: 1
              notLocal:
                type: integer
                description: 1 if the domain is externally managed (not authoritative), 0
                  otherwise
                example: 0
              labels:
                type: array
                description: Only present when includeLabels=yes
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    color:
                      type: string
      required:
        - status
        - domains
    UpdateNsRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - ns
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        ns:
          type: array
          items:
            type: string
          description: Ordered array of nameserver hostnames
          example:
            - ns1.example.com
            - ns2.example.com
    UpdateAutoRenewRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - status
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        status:
          type: string
          enum:
            - on
            - off
          description: Auto-renew status to set
        domains:
          type: array
          items:
            type: string
          description: Array of additional domain names to update. Combined with the
            domain in the URL path if provided.
    CheckDomainResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        response:
          type: object
          properties:
            avail:
              type: string
              enum:
                - yes
                - no
              description: Whether the domain is available for registration
            type:
              type: string
              example: registration
              description: The price type (always 'registration' for the primary price)
            price:
              type: string
              description: Registration price per year in USD
              example: "9.73"
            firstYearPromo:
              type: string
              enum:
                - yes
                - no
              description: Whether the returned price is a first-year promotional price
            regularPrice:
              type: string
              description: Standard (non-promo) registration price in USD
              example: "9.73"
            premium:
              type: string
              enum:
                - yes
                - no
              description: Whether this is a premium domain
            minDuration:
              type: integer
              description: Minimum registration duration in years required by the registry
              example: 1
            additional:
              type: object
              description: Renewal and transfer pricing for this domain
              properties:
                renewal:
                  type: object
                  properties:
                    type:
                      type: string
                    price:
                      type: string
                    regularPrice:
                      type: string
                transfer:
                  type: object
                  properties:
                    type:
                      type: string
                    price:
                      type: string
                    regularPrice:
                      type: string
        limits:
          type: object
          description: Current rate limit usage for this account
          properties:
            TTL:
              type: integer
              description: Rate limit window in seconds
            limit:
              type: integer
              description: Maximum checks allowed in the window
            used:
              type: integer
              description: Number of checks used so far in the current window
            naturalLanguage:
              type: string
              description: Human-readable rate limit summary
              example: 1 out of 1 checks within 10 seconds used.
        ttlRemaining:
          type: integer
          description: Seconds remaining until the rate limit window resets
      required:
        - status
        - response
    CreateDomainRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - cost
        - agreeToTerms
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        cost:
          type: integer
          description: The registration cost in pennies (USD cents). Must exactly equal
            the total price for the domain at its minimum registration duration.
            Obtain this from /domain/checkDomain first.
        agreeToTerms:
          type: string
          enum:
            - yes
            - "1"
          description: Must be 'yes' or '1' to confirm agreement to the Domain Name
            Registration Agreement, Product Terms of Service, Privacy Policy,
            and automatic renewal terms.
    CreateDomainResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        domain:
          type: string
          description: The registered domain name
          example: example.com
        cost:
          type: integer
          description: The total amount charged in pennies
        orderId:
          type: integer
          description: Internal Porkbun order ID
        limits:
          type: object
          description: Current rate limit state for both attempt and success limits
          properties:
            attempts:
              type: object
              description: Create-attempt rate limit state
              properties:
                TTL:
                  type: integer
                  description: Window in seconds
                limit:
                  type: integer
                  description: Max attempts allowed
                used:
                  type: integer
                  description: Attempts used
                naturalLanguage:
                  type: string
            success:
              type: object
              description: Successful-registration rate limit state
              properties:
                TTL:
                  type: integer
                  description: Window in seconds
                limit:
                  type: integer
                  description: Max successes allowed
                used:
                  type: integer
                  description: Successes used
                naturalLanguage:
                  type: string
        balance:
          type: integer
          description: Remaining account credit balance in pennies after the charge
        ttlRemaining:
          type: integer
          description: Seconds until the success rate limit window resets
      required:
        - status
        - domain
        - orderId
    AddUrlForwardRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - location
        - type
        - includePath
        - wildcard
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        subdomain:
          type: string
          description: Subdomain to forward (optional, leave blank or omit for root
            domain). Alphanumeric and hyphens only.
          example: www
        location:
          type: string
          description: Destination URL to forward to
          example: https://destination.example.com
        type:
          type: string
          enum:
            - temporary
            - permanent
          description: "'permanent' sends HTTP 301, 'temporary' sends the configured
            default redirect code"
        includePath:
          type: string
          enum:
            - yes
            - no
          description: Whether to append the request URI path to the forwarding destination
        wildcard:
          type: string
          enum:
            - yes
            - no
          description: Whether to also forward all subdomains of the forwarded subdomain
    GetUrlForwardingResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        forwards:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Numeric record ID
              subdomain:
                type: string
                description: Subdomain portion (empty string for root)
              location:
                type: string
              type:
                type: string
                enum:
                  - permanent
                  - temporary
                description: Redirect type
              includePath:
                type: string
                enum:
                  - yes
                  - no
              wildcard:
                type: string
                enum:
                  - yes
                  - no
      required:
        - status
        - forwards
    GlueRecordRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - ips
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        ips:
          type: array
          items:
            type: string
          description: Array of IP addresses (IPv4 and/or IPv6) to associate with the host
            record
          example:
            - 1.2.3.4
            - 2001:db8::1
    DnsRecordsResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        cloudflare:
          type: string
          enum:
            - enabled
            - disabled
          description: Whether Cloudflare proxy is enabled for this domain
        records:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Numeric record ID
              name:
                type: string
                description: Fully-qualified record name
                example: www.example.com
              type:
                type: string
                description: DNS record type
                example: A
              content:
                type: string
                description: Record value
                example: 1.2.3.4
              ttl:
                type: string
                description: Time to live in seconds
                example: "600"
              prio:
                type: string
                nullable: true
                description: Priority (used for MX, SRV records). Null if not applicable.
                example: "10"
              notes:
                type: string
                nullable: true
                description: Optional notes attached to the record. Null if not set.
      required:
        - status
        - records
    CreateDnsRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - type
        - content
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        name:
          type: string
          description: Subdomain for the record (e.g. 'www', '*' for wildcard, blank for
            root). Do not include the domain name itself.
          example: www
        type:
          type: string
          description: DNS record type
          enum:
            - A
            - AAAA
            - MX
            - CNAME
            - ALIAS
            - TXT
            - NS
            - SRV
            - TLSA
            - CAA
            - SSHFP
          example: A
        content:
          type: string
          description: The record value
          example: 1.2.3.4
        ttl:
          type: integer
          description: Time to live in seconds. Minimum is determined by account settings
            (typically 600). Defaults to the account minimum if omitted or 0.
          example: 600
        prio:
          type: integer
          description: Priority for MX and SRV records. Defaults to 0 if omitted.
          example: 10
        notes:
          type: string
          description: Optional notes to store with the record (not served in DNS)
    EditDnsRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - type
        - content
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        name:
          type: string
          description: Subdomain for the record. Do not include the domain name itself.
        type:
          type: string
          description: DNS record type
          enum:
            - A
            - AAAA
            - MX
            - CNAME
            - ALIAS
            - TXT
            - NS
            - SRV
            - TLSA
            - CAA
            - SSHFP
          example: A
        content:
          type: string
          description: The record value
          example: 5.6.7.8
        ttl:
          type: integer
          description: Time to live in seconds (optional)
        prio:
          type: integer
          description: Priority for MX/SRV records (optional)
        notes:
          type: string
          description: Notes (optional). Pass empty string to clear notes; omit or pass
            null to leave unchanged.
    EditDnsByNameTypeRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - content
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        content:
          type: string
          description: New record value to set on all matching records
          example: 5.6.7.8
        ttl:
          type: integer
          description: Time to live in seconds (optional)
        prio:
          type: integer
          description: Priority (optional)
        notes:
          type: string
          description: Notes to store with the record (not served in DNS). Pass an empty
            string to clear existing notes; pass null or omit this field to
            leave notes unchanged.
    CreateDnssecRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - keyTag
        - alg
        - digestType
        - digest
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        keyTag:
          type: string
          description: DNSSEC key tag
          example: "12345"
        alg:
          type: string
          description: DS Data algorithm number (e.g. 13 for ECDSA P-256 SHA-256)
          example: "13"
        digestType:
          type: string
          description: Digest type number (e.g. 2 for SHA-256)
          example: "2"
        digest:
          type: string
          description: Hex-encoded digest value
          example: ABCD1234...
        maxSigLife:
          type: string
          description: Maximum signature lifetime in seconds (optional, registry-specific)
        keyDataFlags:
          type: string
          description: Key data flags (optional, used when submitting full key data)
        keyDataProtocol:
          type: string
          description: Key data protocol (optional)
        keyDataAlgo:
          type: string
          description: Key data algorithm (optional)
        keyDataPubKey:
          type: string
          description: Key data public key in base64 (optional)
    RenewDomainRequest:
      type: object
      required:
        - apikey
        - secretapikey
        - cost
      properties:
        apikey:
          type: string
        secretapikey:
          type: string
        cost:
          type: integer
          description: The renewal cost in pennies (USD cents). Must exactly equal the
            total price for the domain at its minimum renewal duration. Obtain
            this from /domain/checkDomain first.
    RenewDomainResponse:
      type: object
      required:
        - status
        - domain
        - orderId
      properties:
        status:
          type: string
          example: SUCCESS
        domain:
          type: string
          description: The renewed domain name
          example: example.com
        expirationDate:
          type: string
          description: The new expiration date returned by the registry
          example: 2026-04-21
        cost:
          type: integer
          description: The total amount charged in pennies
        orderId:
          type: integer
          description: Internal Porkbun order ID
        limits:
          type: object
          description: Current rate limit state for both attempt and success limits
          properties:
            attempts:
              type: object
              properties:
                TTL:
                  type: integer
                  description: Window in seconds
                limit:
                  type: integer
                  description: Max attempts allowed
                used:
                  type: integer
                  description: Attempts used
                naturalLanguage:
                  type: string
            success:
              type: object
              properties:
                TTL:
                  type: integer
                  description: Window in seconds
                limit:
                  type: integer
                  description: Max successes allowed
                used:
                  type: integer
                  description: Successes used
                naturalLanguage:
                  type: string
        balance:
          type: integer
          description: Remaining account credit balance in pennies after the charge
        ttlRemaining:
          type: integer
          description: Seconds until the success rate limit window resets
    TransferDomainRequest:
      type: object
      required:
        - secretapikey
        - apikey
        - authCode
        - cost
      properties:
        secretapikey:
          type: string
          description: Your API secret key.
        apikey:
          type: string
          description: Your API key.
        authCode:
          type: string
          description: The EPP auth code for the domain.
        cost:
          type: integer
          description: The transfer cost in cents as returned by the pricing API. Must
            match exactly.
    TransferDomainResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - ERROR
        domain:
          type: string
        orderId:
          type: integer
        transferId:
          type: integer
        message:
          type: string
        balance:
          type: integer
          description: Remaining account credit balance in cents.
        ttlRemaining:
          type: integer
        limits:
          type: object
          properties:
            attempts:
              type: object
            success:
              type: object
    GetTransferResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - ERROR
        transfer:
          type: object
          properties:
            domain:
              type: string
            status:
              type: string
              enum:
                - NEW
                - PENDINGAUTH
                - PENDINGSUBMIT
                - PENDINGTRANSFER
                - DONE
                - CANCELED
                - INIT
            statusDescription:
              type: string
            transferDate:
              type: string
              format: date-time
            orderId:
              type: integer
    ListTransfersResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - ERROR
        transfers:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              status:
                type: string
                enum:
                  - NEW
                  - PENDINGAUTH
                  - PENDINGSUBMIT
                  - PENDINGTRANSFER
                  - DONE
                  - CANCELED
                  - INIT
              statusDescription:
                type: string
              transferDate:
                type: string
                format: date-time
              orderId:
                type: integer
    BalanceResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - ERROR
        balance:
          type: integer
          description: Available account credit balance in cents.
        display:
          type: string
          description: Human-readable balance string (e.g. `$12.34`).
    ApiSettingsResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - ERROR
        settings:
          type: object
          properties:
            monthlySpendLimit:
              type: integer
              nullable: true
              description: Maximum API spend per calendar month in cents. `null` means no
                limit.
            lowBalanceAlert:
              type: integer
              nullable: true
              description: Send an alert email when balance drops below this amount (cents).
                `null` = disabled.
            autoTopup:
              type: boolean
              description: Whether automatic balance top-up is enabled.
            topupThreshold:
              type: integer
              nullable: true
              description: Trigger auto top-up when balance falls below this amount (cents).
                `null` = disabled.
            topupAmount:
              type: integer
              nullable: true
              description: Amount to add during an auto top-up (cents).
        monthlySpend:
          type: integer
          description: Total API spend in the current calendar month, in cents.
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 255
      description: Optional. A unique string (e.g. UUID) to make this request safely
        retriable. Retries within 24 hours return the cached response. See the
        Idempotency section in the introduction for full semantics.
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: Your API key. Use together with X-Secret-API-Key.
    SecretApiKeyHeader:
      type: apiKey
      in: header
      name: X-Secret-API-Key
      description: Your secret API key. Use together with X-API-Key.
security:
  - ApiKeyHeader: []
    SecretApiKeyHeader: []
tags:
  - name: Account
    description: Account credit balance, API spend controls, and onboarding
  - name: Domain
    description: Domain registration, nameservers, URL forwarding, glue records, and
      auto-renewal
  - name: DNS
    description: Create, read, update, and delete DNS records including DNSSEC
  - name: SSL
    description: Retrieve free SSL certificate bundles for domains registered at Porkbun
  - name: Email Hosting
    description: Email hosting password management
  - name: Marketplace
    description: Browse domains listed for sale on the Porkbun marketplace
  - name: Pricing
    description: Domain pricing across all supported TLDs — no authentication required
  - name: API Key Management
    description: Request and retrieve API keys programmatically
  - name: Utility
    description: IP detection and credential verification
