  /marketplace/getAll:
    get:
      tags:
        - Marketplace
      summary: List marketplace domains
      description: >-
        GET form of `/marketplace/getAll` for read-friendly filtering and
        URL-shareable searches. Authenticate via `X-API-Key` and
        `X-Secret-API-Key` headers, or `Authorization: Bearer <token>`. All
        filter params are optional and mirror the POST body. For multi-value
        `tlds`, use bracket syntax: `?tlds[]=com&tlds[]=io`.


        See the POST documentation for the full filtering semantics (unfiltered
        pagination vs filtered mode, `+include` / `-exclude` query prefixes,
        sort options).
      operationId: listMarketplaceListingsGet
      parameters:
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
          description: API key header auth (use with X-Secret-API-Key)
        - name: X-Secret-API-Key
          in: header
          required: false
          schema:
            type: string
          description: Secret API key header auth (use with X-API-Key)
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: "SLD substring search. Multi-word; prefix a term with `-` to
            exclude. Example: `ai -test`."
        - name: tlds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: "Filter to listings under these TLDs (without leading dot). Use
            bracket form: `?tlds[]=com&tlds[]=io`."
        - name: sldLengthMin
          in: query
          required: false
          schema:
            type: integer
          description: Minimum SLD character length.
        - name: sldLengthMax
          in: query
          required: false
          schema:
            type: integer
          description: Maximum SLD character length.
        - name: sortName
          in: query
          required: false
          schema:
            type: string
            enum:
              - domain
              - tld
              - price
              - sld_length
          description: Field to sort filtered results by.
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Sort direction.
        - name: start
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Pagination offset (unfiltered mode only).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
          description: Page size (unfiltered mode only). Default 1000, max 5000.
      responses:
        "200":
          description: Marketplace domain list (same shape as POST).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  count:
                    type: integer
                  filtered:
                    type: boolean
                  domains:
                    type: array
                    items:
                      type: object
                      properties:
                        create_date:
                          type: string
                        domain:
                          type: string
                        tld:
                          type: string
                        sld_length:
                          type: integer
                        price:
                          type: number
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl 'https://api.porkbun.com/api/json/v3/marketplace/getAll?query=ai&tlds[]=com&tlds[]=io&sldLengthMax=6&sortName=price&sortDirection=asc' \
              -H 'X-API-Key: pk1_...' \
              -H 'X-Secret-API-Key: sk1_...'
    post:
      tags:
        - Marketplace
      summary: List marketplace domains
      description: >-
        Retrieve domains listed on the Porkbun marketplace. Two modes:


        - **Unfiltered (default):** paginated raw listing, up to 5000 entries
        per call via `start` / `limit`.

        - **Filtered:** when any of `query`, `tlds`, `sldLengthMin`,
        `sldLengthMax`, or `sortName` is provided, results are filtered
        server-side. Filtered mode returns up to 1000 matching listings (matches
        the web UI's marketplace search).


        `query` supports `+include` and `-exclude` prefixes per word against the
        SLD (e.g. `+ai -test` matches SLDs containing 'ai' but not 'test').
        Token-based access is not supported.
      operationId: listMarketplaceListings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/AuthRequest"
                - type: object
                  properties:
                    start:
                      type: integer
                      description: Pagination offset (unfiltered mode only). Default 0.
                      example: 0
                    limit:
                      type: integer
                      description: Number of domains to return (unfiltered mode only). Default 1000,
                        max 5000.
                      example: 1000
                      maximum: 5000
                    query:
                      type: string
                      description: Search string. Each space-separated term filters by SLD substring.
                        Prefix a term with `-` to exclude it.
                      example: ai -test
                    tlds:
                      type: array
                      items:
                        type: string
                      description: Filter to listings under these TLDs (without the leading dot).
                      example:
                        - com
                        - io
                    sldLengthMin:
                      type: integer
                      description: Filter to listings whose SLD has at least this many characters.
                      example: 3
                    sldLengthMax:
                      type: integer
                      description: Filter to listings whose SLD has at most this many characters.
                      example: 8
                    sortName:
                      type: string
                      enum:
                        - domain
                        - tld
                        - price
                        - sld_length
                      description: Field to sort filtered results by. Default `sld_length` ascending
                        when `query` is set, otherwise `create_date` descending.
                    sortDirection:
                      type: string
                      enum:
                        - asc
                        - desc
                      description: Sort direction. Defaults vary by `sortName`.
      responses:
        "200":
          description: Marketplace domain list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  count:
                    type: integer
                    description: Number of domains returned in this response
                  filtered:
                    type: boolean
                    description: True when one or more filter parameters were applied (query, tlds,
                      sldLengthMin/Max, sortName).
                  domains:
                    type: array
                    items:
                      type: object
                      properties:
                        create_date:
                          type: string
                          description: Date the listing was created
                        domain:
                          type: string
                        tld:
                          type: string
                        sld_length:
                          type: integer
                          description: Character length of the SLD (the part of the domain before the TLD)
                        price:
                          type: number
                          description: Listing price in USD
        "400":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: curl
          label: curl
          source: >-
            curl -X POST https://api.porkbun.com/api/json/v3/marketplace/getAll
            \
              -H 'Content-Type: application/json' \
              -d '{"apikey":"pk1_...","secretapikey":"sk1_...","start":0,"limit":1000}'
  /account/invite:
    post:
      tags:
        - Account
      summary: Create an account registration invite
      operationId: createAccountInvite
      description: >-
        Generates a one-time invite token and URL that you send to a prospective
        user. When the user visits the URL they go through Porkbun's normal
        account creation flow — including CAPTCHA, address collection, and TOS
        acceptance — in the browser. The invite expires in 48 hours. Each token
        can only be used once.


        Optionally supply an `email` to pre-fill the email field on the
        registration form.


        Optionally supply a `returnUrl` (must be HTTPS) to redirect the user
        back to your platform after they complete registration.


        After sending the invite URL, poll `/account/inviteStatus` to check
        whether the account was created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - apikey
                - secretapikey
              properties:
                apikey:
                  type: string
                  description: Your API key
                secretapikey:
                  type: string
                  description: Your secret API key
                email:
                  type: string
                  format: email
                  description: Email address to pre-fill on the registration form (optional)
                returnUrl:
                  type: string
                  format: uri
                  description: HTTPS URL to redirect the user to after successful registration
                    (optional). Use this to send users back to your platform
                    after they complete account creation.
                  example: https://yourapp.com/onboarding/complete
      responses:
        "200":
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - inviteToken
                  - inviteUrl
                  - expires
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  inviteToken:
                    type: string
                    description: Opaque token — pass to `/account/inviteStatus` to track completion
                    example: a3f8c2...
                  inviteUrl:
                    type: string
                    format: uri
                    description: URL to send to the prospective user. Opens Porkbun's standard
                      registration page.
                    example: https://porkbun.com/account/create?invite=a3f8c2...
                  expires:
                    type: string
                    format: date-time
                    description: UTC datetime when the invite token expires (48 hours from creation)
                    example: 2024-01-16 14:30:00
        "400":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: curl
          label: curl
          source: >-
            curl -X POST https://api.porkbun.com/api/json/v3/account/invite \
              -H 'Content-Type: application/json' \
              -d '{"apikey":"pk1_...","secretapikey":"sk1_...","email":"newuser@example.com"}'
  /account/inviteStatus:
    get:
      tags:
        - Account
      summary: Check account invite status
      operationId: getAccountInviteStatus
      description: >-
        Returns the current status of a registration invite created by your API
        key.


        - `PENDING` — the invite URL has not yet been used

        - `ACCEPTED` — the user completed registration; `newAccountId` contains
        their account ID

        - `EXPIRED` — the invite was not used within 48 hours or was canceled


        You can only query invites created by your own API key. Pass credentials
        via `X-API-Key` and `X-Secret-API-Key` headers.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: The `inviteToken` returned by `/account/invite`
        - name: X-API-Key
          in: header
          required: true
          schema:
            type: string
          description: Your API key
        - name: X-Secret-API-Key
          in: header
          required: true
          schema:
            type: string
          description: Your secret API key
      responses:
        "200":
          description: Status returned
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - inviteStatus
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  inviteStatus:
                    type: string
                    enum:
                      - PENDING
                      - ACCEPTED
                      - EXPIRED
                    description: Current state of the invite
                  newAccountId:
                    type: integer
                    description: ID of the newly created account. Present only when `inviteStatus`
                      is `ACCEPTED`.
                    example: 12345
        "400":
          description: Authentication failed or token not found / not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: curl
          label: curl
          source: |-
            curl 'https://api.porkbun.com/api/json/v3/account/inviteStatus?token=a3f8c2...' \
              -H 'X-API-Key: pk1_...' \
              -H 'X-Secret-API-Key: sk1_...'
